# Redis configuration for Smart Parking Enforcement (production)
# Copy to /etc/redis/redis.conf or pass as: redis-server /path/to/redis.conf

bind 127.0.0.1
port 6379

# AUTH even on localhost
requirepass CHANGEME_REDIS_PASSWORD

# Memory cap — all streams are MAXLEN-bounded so total usage stays ~1.6GB.
# noeviction causes XADD to fail loudly if Redis ever exceeds this limit,
# rather than silently evicting parking:slot:state (which would cause spurious
# camera captures — a legal problem for enforcement).
maxmemory 4gb
maxmemory-policy noeviction

# Persistence: AOF (survive power loss) + RDB (secondary safety net)
appendonly yes
appendfsync everysec
save 900 1
save 300 10
save 60 10000

# Log level
loglevel notice
logfile /var/log/redis/redis-server.log

# Max client connections
maxclients 512
